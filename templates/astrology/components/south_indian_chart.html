{# South Indian fixed-rasi perimeter layout (Kerala style). Expects: chart_root_id #}
<div class="si-chart-wrapper" id="{{ chart_root_id }}">
  <div class="si-chart">
    <div class="si-grid">
      <div class="si-cell corner-tl" data-rasi="Karka" style="grid-column: 1; grid-row: 1;">
        <span class="rasi-num">4</span>
        <div class="planets"></div>
      </div>
      <div class="si-cell" data-rasi="Mithuna" style="grid-column: 2; grid-row: 1;">
        <span class="rasi-num">3</span>
        <div class="planets"></div>
      </div>
      <div class="si-cell" data-rasi="Vrishabha" style="grid-column: 3; grid-row: 1;">
        <span class="rasi-num">2</span>
        <div class="planets"></div>
      </div>
      <div class="si-cell corner-tr" data-rasi="Mesha" style="grid-column: 4; grid-row: 1;">
        <span class="rasi-num">1</span>
        <div class="planets"></div>
      </div>

      <div class="si-cell" data-rasi="Simha" style="grid-column: 1; grid-row: 2;">
        <span class="rasi-num">5</span>
        <div class="planets"></div>
      </div>
      <div class="si-center" style="grid-column: 2 / span 2; grid-row: 2 / span 2;"></div>
      <div class="si-cell" data-rasi="Meena" style="grid-column: 4; grid-row: 2;">
        <span class="rasi-num">12</span>
        <div class="planets"></div>
      </div>

      <div class="si-cell" data-rasi="Kanya" style="grid-column: 1; grid-row: 3;">
        <span class="rasi-num">6</span>
        <div class="planets"></div>
      </div>
      <div class="si-cell" data-rasi="Kumbha" style="grid-column: 4; grid-row: 3;">
        <span class="rasi-num">11</span>
        <div class="planets"></div>
      </div>

      <div class="si-cell corner-bl" data-rasi="Tula" style="grid-column: 1; grid-row: 4;">
        <span class="rasi-num">7</span>
        <div class="planets"></div>
      </div>
      <div class="si-cell" data-rasi="Vrischika" style="grid-column: 2; grid-row: 4;">
        <span class="rasi-num">8</span>
        <div class="planets"></div>
      </div>
      <div class="si-cell" data-rasi="Dhanus" style="grid-column: 3; grid-row: 4;">
        <span class="rasi-num">9</span>
        <div class="planets"></div>
      </div>
      <div class="si-cell corner-br" data-rasi="Makara" style="grid-column: 4; grid-row: 4;">
        <span class="rasi-num">10</span>
        <div class="planets"></div>
      </div>
    </div>
  </div>
</div>
